language: "javascript"
layer: "library"

tasks:
  build:
    command: node
    args:
      - scripts/dummy-build.cjs
    deps:
      - "stripped:build"
    inputs:
      - "/packages/stripped/build/stripped-comments/**"
      - "src/build-only.json"
      - "scripts/**/*.cjs"
    outputs:
      - "dist"
